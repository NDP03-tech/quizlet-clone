version: '3.8'

services:
  # 1. Hạ tầng Cơ sở dữ liệu PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: quizlet_postgres
    restart: always
    environment:
      POSTGRES_USER: quizlet_admin
      POSTGRES_PASSWORD: phuc2112003
      POSTGRES_DB: quizlet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Lưu dữ liệu xuống ổ cứng, tắt container không bị mất data

  # 2. Bộ nhớ đệm và Hàng đợi Redis (Dùng chung cho Cache & BullMQ)
  redis_cache:
    image: redis:7-alpine
    container_name: quizlet_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru # Tối ưu RAM cho Redis chuẩn Production
    volumes:
      - redis_data:/data

  # 3. Ứng dụng Backend NestJS
  api_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizlet_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://quizlet_admin:phuc2112003@postgres_db:5432/quizlet_db
      - REDIS_URL=redis://redis_cache:6379
      - NODE_ENV=production
    depends_on:
      - postgres_db # Đợi DB lên trước rồi mới chạy Backend
      - redis_cache # Đợi Redis lên trước rồi mới chạy Backend

volumes:
  postgres_data:
  redis_data: